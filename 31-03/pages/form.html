<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <!--  -->
    <form action="">
        <h2>Formulário de cadastro</h2>
        <label for="nome">nome</label> <!-- Dá um título para o campo abaixo -->
        <input type="text" name="nome" id=""> <!-- Input é o campo onde vamos escrever algo -->

        <label for="email">Email</label>
        <input type="email" name="email" id="">

        <label for="senha">Senha</label>
        <input type="password" name="Senha" id="">

        <label for="escolhas">O que você sabe???</label>
        <input type="checkbox" name="escolhas" value="JS" id="">JS
        <input type="checkbox" name="escolhas" value="HTML" id="">HTML
        <input type="checkbox" name="escolhas" value="CSS" id="">CSS

        <label for="sexo">Sexo</label>
        <input type="radio" name="sexo" value="Masculino" id="">Masculino
        <input type="radio" name="sexo" value="Feminino" id="">Feminino
        <input type="radio" name="sexo" value="indefinido" id="">indefinido
        <input type="radio" name="sexo" value="Prefiro não dizer" id="">Prefiro não dizer

        <!-- Select (lista suspensa) -->
        <label for="curso">curso desejado:</label>
        <select name="curso" id="">
            <option value="html">HTML</option>
            <option value="js">JS</option>
            <option value="CSS">CSS</option>
        </select>

        <label for="mensagem">Mensagem</label>
        <textarea name="mensagem" id="" cols="30" rows="10"></textarea>

        <label for="aniversario">Data de Nascimento</label>
        <input type="date" name="Nascimento" id="">

        <button type="submit">Enviar</button>



    </form>




    
</body>
</html>
